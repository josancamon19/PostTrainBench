name: posttrainbench
description: |
  PostTrainBench measures the ability of CLI agents to post-train pre-trained
  LLMs. The agent is given a base model, an H100 GPU, and 10 hours to improve
  the model's performance on a given benchmark.

datasets:
  - path: datasets/posttrainbench
    pattern: gsm8k-*-tinker

agents:
  # - name: nop
  - name: claude-code
    # model_name: anthropic/claude-opus-4-6
    model_name: global.anthropic.claude-opus-4-6-v1
    env:
      CLAUDE_CODE_MAX_OUTPUT_TOKENS: "65536"
  - name: gemini-cli
    model_name: gemini/gemini-3-flash-preview

  # # focus on cheaters later
  - name: codex
    model_name: openai/gpt-5.4-2026-03-05
  # - name: gemini-cli
  #   model_name: gemini/gemini-3.1-pro-preview
  # - name: gemini-cli
  #   model_name: gemini/gemini-3-pro-preview

environment:
  type: modal
  delete: true
  env:
    - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
    - TINKER_API_KEY=${TINKER_API_KEY}

orchestrator:
  type: local
  n_concurrent_trials: 1
  quiet: false

# Collect agent workspace (code, logs, training scripts) after each run.
artifacts:
  - source: /app
    destination: workspace
