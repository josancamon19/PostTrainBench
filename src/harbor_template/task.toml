version = "1.0"

[metadata]
author_name = "PostTrainBench Team"
category = "ml-training"
tags = ["post-training", "llm", "fine-tuning", "gpu"]

[environment]
gpus = 1
gpu_types = ["H100", "A100"]
cpus = 4
memory_mb = 8192
storage_mb = 102400
build_timeout_sec = 600.0
allow_internet = true

[environment.env]
HF_TOKEN = "${HF_TOKEN}"

[verifier]
# 1h budget: primary eval (3-phase retry) + regression suite (up to 6 extra evals)
timeout_sec = 3600.0

[verifier.env]
OPENAI_API_KEY = "${OPENAI_API_KEY}"
HF_TOKEN = "${HF_TOKEN}"

[agent]
timeout_sec = 36000.0

[[artifacts]]
source = "/app"
destination = "workspace"
