version = "1.0"

[metadata]
author_name = "PostTrainBench Team"
category = "ml-training"
tags = ["post-training", "llm", "fine-tuning", "gpu"]

[environment]
gpus = 1
gpu_types = ["H100"]
cpus = 4
memory_mb = 8192
storage_mb = 10240
build_timeout_sec = 180.0
allow_internet = true

[verifier]
timeout_sec = 1800.0

[verifier.env]
OPENAI_API_KEY = "${OPENAI_API_KEY}"

[agent]
timeout_sec = 36000.0

[[artifacts]]
source = "/app"
destination = "workspace"
