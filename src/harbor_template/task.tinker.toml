version = "1.0"

[metadata]
author_name = "PostTrainBench Team"
category = "ml-training"
tags = ["post-training", "llm", "fine-tuning", "tinker"]

[environment]
gpus = 0
cpus = 4
memory_mb = 8192
storage_mb = 10240
build_timeout_sec = 3600.0
allow_internet = true

[environment.env]
TINKER_API_KEY = "${TINKER_API_KEY}"
HF_TOKEN = "${HF_TOKEN}"

[verifier]
timeout_sec = 3600.0

[verifier.env]
TINKER_API_KEY = "${TINKER_API_KEY}"
# Judge auth — verifier-only. DO NOT move to [environment.env].
AWS_BEARER_TOKEN_BEDROCK = "${AWS_BEARER_TOKEN_BEDROCK}"

[agent]
timeout_sec = 36000.0

[solution.env]
TINKER_API_KEY = "${TINKER_API_KEY}"

[[artifacts]]
source = "/app"
destination = "workspace"
