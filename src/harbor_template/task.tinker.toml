version = "1.0"

[metadata]
author_name = "PostTrainBench Team"
category = "ml-training"
tags = ["post-training", "llm", "fine-tuning", "tinker"]

[environment]
gpus = 0
cpus = 4
memory_mb = 8192
storage_mb = 10240
build_timeout_sec = 1800.0
allow_internet = true

[verifier]
timeout_sec = 900.0

[verifier.env]
TINKER_API_KEY = "${TINKER_API_KEY}"

[agent]
timeout_sec = 3600.0

[agent.env]
TINKER_API_KEY = "${TINKER_API_KEY}"
