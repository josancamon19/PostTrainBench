n_attempts: 1
timeout_multiplier: 1.0
name: posttrainbench-gpu-30min
description: |
  Short 30-minute smoke trial for validating the regression suite
  and the GPU sampler end-to-end on a real H100.

orchestrator:
  type: local
  n_concurrent_trials: 1
  quiet: false

environment:
  type: runpod
  delete: true
  override_gpus: 1
  kwargs:
    gpu_type: h100

agents:
  - name: claude-code
    model_name: global.anthropic.claude-opus-4-6-v1
    override_timeout_sec: 1800
    env:
      CLAUDE_CODE_MAX_OUTPUT_TOKENS: "128000"

datasets:
  - path: datasets/posttrainbench/gpu-runpod
    task_names:
      - gsm8k-llama3.2-1b

artifacts:
  - source: /app
    destination: workspace
