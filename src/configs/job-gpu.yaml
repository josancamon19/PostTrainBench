n_attempts: 1
timeout_multiplier: 1.0
name: posttrainbench-gpu
description: |
  PostTrainBench GPU mode test run.

orchestrator:
  type: local
  n_concurrent_trials: 4
  quiet: false

# Retry transient RunPod pod-creation failures with exponential backoff.
# Harbor's default exclude_exceptions skips AgentTimeoutError / VerifierTimeoutError
# / reward-file errors, so a real 10h agent timeout won't be retried.
retry:
  max_retries: 3
  min_wait_sec: 30
  max_wait_sec: 300
  wait_multiplier: 2.0

environment:
  type: runpod
  delete: true
  override_gpus: 1
  kwargs:
    gpu_type: h100

agents:
  - name: claude-code
    model_name: global.anthropic.claude-opus-4-6-v1
    override_timeout_sec: 36000
    env:
      CLAUDE_CODE_MAX_OUTPUT_TOKENS: "128000"

datasets:
  - path: datasets/posttrainbench/gpu-runpod
    task_names:
      # Same 10 tasks the first tinker job ran (jobs/2026-04-03__22-22-40).
      # - arenahardwriting-llama3.2-1b  # passed previous run
      # - gpqamain-llama3.2-1b
      # - gsm8k-llama3.2-1b
      # - humaneval-llama3.2-1b
      # - healthbench-llama3.2-1b
      # - gsm8k-llama3.2-3b
      # - arenahardwriting-llama3.2-3b
      # - gpqamain-llama3.2-3b
      # ---
      # - healthbench-llama3.2-3b
      # - humaneval-llama3.2-3b

artifacts:
  - source: /app
    destination: workspace
