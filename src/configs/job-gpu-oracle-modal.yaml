n_attempts: 1
timeout_multiplier: 1.0
name: posttrainbench-oracle-modal
description: |
  Oracle smoke on Modal — solution/solve.sh downloads the instruct model,
  verifier scores it. Uses the GPU dataset (Dockerfile build), not
  gpu-runpod (prebuilt image).

orchestrator:
  type: local
  n_concurrent_trials: 1
  quiet: false

environment:
  type: modal
  delete: true

agents:
  - name: oracle

datasets:
  - path: datasets/posttrainbench/gpu
    task_names:
      - gsm8k-llama3.2-1b

artifacts:
  - source: /app
    destination: workspace
