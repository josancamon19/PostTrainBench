n_attempts: 1
datasets:
  - path: datasets/posttrainbench/tinker
    task_names:
      - "ifeval-llama3.2-1b-tinker"

agents:
  - name: oracle
  # - name: claude-code
  #   model_name: anthropic/claude-opus-4-8

environment:
  type: daytona
  delete: false

orchestrator:
  type: local
  n_concurrent_trials: 16
  quiet: false

# Collect agent workspace (code, logs, training scripts) after each run.
artifacts:
  - source: /app
    destination: workspace
