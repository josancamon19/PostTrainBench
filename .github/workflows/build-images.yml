name: Build images

on:
  push:
    branches: [main]
    paths:
      - "src/harbor_template/environment/base/gpu.Dockerfile"
      - "src/harbor_template/environment/base/tinker.Dockerfile"
      - "src/tasks/**"
      - "src/adapter.py"
      - "src/constants.py"
      - ".github/workflows/build-images.yml"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  REPO: ghcr.io/josancamon19/posttrainbench

jobs:
  build-base:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: src/harbor_template/environment
          file: src/harbor_template/environment/base/gpu.Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.REPO }}-gpu:latest
      - uses: docker/build-push-action@v6
        with:
          context: src/harbor_template/environment
          file: src/harbor_template/environment/base/tinker.Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.REPO }}-tinker:latest

  # Per-task GPU images disabled — gpu-runpod uses setup.sh at runtime instead
  # build-gpu-tasks:
  #   needs: build-base
  #   ...
